name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26"
  IMAGE: registry.cn-hangzhou.aliyuncs.com/zhoupb/deployd

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.meta.outputs.publish }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          set -euo pipefail
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod / go.sum 有未提交的更改，请本地跑 'go mod tidy' 后再提交" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -ldflags='-s -w' -o /tmp/deployd ./cmd/deployd

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet -exclude-dir=deploy ./...

      - name: Trivy filesystem scan (Dockerfile + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # 扫 Dockerfile 配置问题、误提交的密钥；vuln 扫描留给 image scan，避免重复噪音
          scanners: misconfig,secret

      - name: Build metadata
        id: meta
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          safe_ref="${GITHUB_REF_NAME//\//-}"
          image_tag="${safe_ref}-${short_sha}"
          publish=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publish=true
          fi
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

          cat <<SUMMARY >> "${GITHUB_STEP_SUMMARY}"
          ## Build metadata

          - image tag: ${image_tag}
          - publish image: ${publish}
          SUMMARY

      - name: Check Docker build
        if: steps.meta.outputs.publish != 'true'
        run: docker build -t deployd-ci:${{ steps.meta.outputs.short_sha }} .

  publish-image:
    name: Publish image
    needs: ci
    if: needs.ci.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry secrets
        env:
          ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            ALIYUN_REGISTRY_USERNAME \
            ALIYUN_REGISTRY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: ${name}" >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Build image (locally, before scan)
        env:
          IMAGE_TAG: ${{ needs.ci.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker build \
            -t "${IMAGE}:${IMAGE_TAG}" \
            -t "${IMAGE}:latest" \
            .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ needs.ci.outputs.image_tag }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln

      - name: Login to Aliyun registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.ci.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker push "${IMAGE}:${IMAGE_TAG}"
          docker push "${IMAGE}:latest"

          cat <<SUMMARY >> "${GITHUB_STEP_SUMMARY}"
          ## Published

          - \`${IMAGE}:${IMAGE_TAG}\`
          - \`${IMAGE}:latest\`
          SUMMARY
